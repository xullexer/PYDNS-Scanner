name: Build Executables

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ── Desktop builds (x86_64 runners) ────────────────────────────
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          pip install -r requirements-full.txt || true
      
      - name: Build Windows executable
        run: pyinstaller --clean pydns-scanner.spec
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: pydns-scanner-windows
          path: dist/pydns-scanner.exe
          retention-days: 5

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          pip install -r requirements-full.txt || true
      
      - name: Build Linux executable
        run: pyinstaller --clean pydns-scanner.spec
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: pydns-scanner-linux
          path: dist/pydns-scanner
          retention-days: 5

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          pip install -r requirements-full.txt || true
      
      - name: Build macOS executable
        run: pyinstaller --clean pydns-scanner.spec
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: pydns-scanner-macos
          path: dist/pydns-scanner
          retention-days: 5

  # ── Linux ARM builds (QEMU emulation) ──────────────────────────
  build-linux-arm:
    name: Build Linux ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            distro: bookworm
            artifact-name: pydns-scanner-linux-aarch64
          - arch: armv7
            distro: bookworm
            artifact-name: pydns-scanner-linux-arm
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: uraimo/run-on-arch-action@v2
        name: Build on ${{ matrix.arch }}
        with:
          arch: ${{ matrix.arch }}
          distro: ${{ matrix.distro }}
          githubToken: ${{ github.token }}
          install: |
            apt-get update -q -y
            apt-get install -q -y \
              python3 python3-pip python3-venv python3-dev \
              build-essential libffi-dev libssl-dev libc-ares-dev
          run: |
            python3 -m venv /opt/venv
            . /opt/venv/bin/activate
            pip install --upgrade pip setuptools wheel
            pip install pyinstaller
            pip install -r requirements.txt
            python -m PyInstaller --clean pydns-scanner.spec
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/pydns-scanner
          retention-days: 5

  # ── Release (optional, manual only) ─────────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos, build-linux-arm]
    runs-on: ubuntu-latest
    if: github.event.inputs.create_release == 'true'
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: pydns-scanner-windows
          path: ./artifacts/windows
      
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: pydns-scanner-linux
          path: ./artifacts/linux
      
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: pydns-scanner-macos
          path: ./artifacts/macos
      
      - name: Download Linux ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: pydns-scanner-linux-aarch64
          path: ./artifacts/linux-aarch64
      
      - name: Download Linux ARM artifact
        uses: actions/download-artifact@v4
        with:
          name: pydns-scanner-linux-arm
          path: ./artifacts/linux-arm
      
      - name: Rename executables
        run: |
          mv ./artifacts/windows/pydns-scanner.exe ./pydns-scanner-windows.exe
          mv ./artifacts/linux/pydns-scanner ./pydns-scanner-linux
          mv ./artifacts/macos/pydns-scanner ./pydns-scanner-macos
          mv ./artifacts/linux-aarch64/pydns-scanner ./pydns-scanner-linux-aarch64
          mv ./artifacts/linux-arm/pydns-scanner ./pydns-scanner-linux-arm
          chmod +x ./pydns-scanner-linux
          chmod +x ./pydns-scanner-macos
          chmod +x ./pydns-scanner-linux-aarch64
          chmod +x ./pydns-scanner-linux-arm
      
      - name: Get version from tag or branch
        id: get_version
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          files: |
            pydns-scanner-windows.exe
            pydns-scanner-linux
            pydns-scanner-macos
            pydns-scanner-linux-aarch64
            pydns-scanner-linux-arm
          body_path: RELEASE_NOTES.md
          draft: true
          prerelease: false

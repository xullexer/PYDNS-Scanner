name: Publish to PyPI and Build Executables

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.4
  workflow_dispatch:  # Allow manual trigger

jobs:
  # ── Desktop builds (x86_64 runners) ────────────────────────────
  build-executables:
    name: Build ${{ matrix.os }} executable
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact-name: pydns-scanner-windows.exe
            build-path: dist/pydns-scanner.exe
          - os: ubuntu-latest
            artifact-name: pydns-scanner-linux
            build-path: dist/pydns-scanner
          - os: macos-latest
            artifact-name: pydns-scanner-macos
            build-path: dist/pydns-scanner
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          pip install -r requirements-full.txt || true
      
      - name: Build executable
        run: pyinstaller --clean pydns-scanner.spec
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.build-path }}
          retention-days: 5

  # ── Linux ARM builds (QEMU emulation) ──────────────────────────
  build-linux-arm:
    name: Build Linux ${{ matrix.arch }} executable
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            distro: bookworm
            artifact-name: pydns-scanner-linux-aarch64
          - arch: armv7
            distro: bookworm
            artifact-name: pydns-scanner-linux-arm
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: uraimo/run-on-arch-action@v2
        name: Build on ${{ matrix.arch }}
        with:
          arch: ${{ matrix.arch }}
          distro: ${{ matrix.distro }}
          githubToken: ${{ github.token }}
          env: |
            PYCARES_USE_SYSTEM_LIB: "1"
          install: |
            apt-get update -q -y
            apt-get install -q -y \
              python3 python3-pip python3-venv python3-dev \
              build-essential libffi-dev libssl-dev zlib1g-dev \
              libc-ares-dev pkg-config patchelf
          run: |
            set -ex
            python3 --version
            export PYCARES_USE_SYSTEM_LIB=1
            python3 -m venv /opt/venv
            . /opt/venv/bin/activate
            pip install --upgrade pip setuptools wheel
            pip install --prefer-binary pyinstaller
            # pycares: try pre-built wheel first; fall back to source build with system lib
            pip install --prefer-binary "pycares>=4.3.0" || \
              PYCARES_USE_SYSTEM_LIB=1 pip install --no-build-isolation "pycares>=4.3.0"
            pip install --prefer-binary -r requirements.txt
            python -m PyInstaller --clean pydns-scanner.spec
            ls -lah dist/
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/pydns-scanner
          retention-days: 5

  # ── Publish to PyPI + create GitHub Release ─────────────────────
  publish:
    needs: [build-executables, build-linux-arm]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing
      contents: write  # Required for creating releases
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build dependencies
        run: pip install build
      
      - name: Build package
        run: python -m build
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
      
      - name: Download all executables
        uses: actions/download-artifact@v4
        with:
          path: ./executables
      
      - name: Prepare release files
        run: |
          mkdir -p release-files
          cp dist/*.whl dist/*.tar.gz release-files/ || true
          # Desktop builds
          cp executables/pydns-scanner-windows.exe/pydns-scanner.exe release-files/pydns-scanner-windows.exe || true
          cp executables/pydns-scanner-linux/pydns-scanner release-files/pydns-scanner-linux || true
          cp executables/pydns-scanner-macos/pydns-scanner release-files/pydns-scanner-macos || true
          # ARM builds
          cp executables/pydns-scanner-linux-aarch64/pydns-scanner release-files/pydns-scanner-linux-aarch64 || true
          cp executables/pydns-scanner-linux-arm/pydns-scanner release-files/pydns-scanner-linux-arm || true
          # Make Linux/macOS executables runnable
          chmod +x release-files/pydns-scanner-linux || true
          chmod +x release-files/pydns-scanner-macos || true
          chmod +x release-files/pydns-scanner-linux-aarch64 || true
          chmod +x release-files/pydns-scanner-linux-arm || true
          ls -lah release-files/
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
